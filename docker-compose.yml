version: '3.8'

services:
  # --- API Gateway / Reverse Proxy ---
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./services:/var/www/html
    networks:
      - rarecare-network

  # --- Microservices ---
  patients:
    build:
      context: ./services/patients
      dockerfile: docker/Dockerfile
    volumes:
      - ./services/patients:/var/www/html
      - ./services/patients/docker/apache.conf:/etc/apache2/sites-available/000-default.conf:ro
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: pg_db
      DB_PORT: 5432
      DB_DATABASE: patients_db
      DB_USERNAME: rarecare
      DB_PASSWORD: rarecare_password
    depends_on:
      - pg_db
    networks:
      - rarecare-network

  maladie:
    build:
      context: ./services/maladie
      dockerfile: docker/Dockerfile
    volumes:
      - ./services/maladie:/var/www/html
      - ./services/maladie/docker/nginx.conf:/opt/docker/etc/nginx/vhost.conf:ro
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql_db
      DB_PORT: 3306
      DB_DATABASE: maladie_db
      DB_USERNAME: rarecare
      DB_PASSWORD: rarecare_password
    depends_on:
      - mysql_db
    networks:
      - rarecare-network

  traitement:
    build:
      context: ./services/traitement
      dockerfile: docker/Dockerfile
    volumes:
      - ./services/traitement:/var/www/html
      - ./services/traitement/docker/nginx.conf:/opt/docker/etc/nginx/vhost.conf:ro
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql_db
      DB_PORT: 3306
      DB_DATABASE: traitement_db
      DB_USERNAME: rarecare
      DB_PASSWORD: rarecare_password
    depends_on:
      - mysql_db
    networks:
      - rarecare-network

  medical-dossier:
    build:
      context: ./services/medical-dossier
      dockerfile: docker/Dockerfile
    volumes:
      - ./services/medical-dossier:/var/www/html
      - ./services/medical-dossier/docker/nginx.conf:/opt/docker/etc/nginx/vhost.conf:ro
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql_db
      DB_PORT: 3306
      DB_DATABASE: dossier_db
      DB_USERNAME: rarecare
      DB_PASSWORD: rarecare_password
    depends_on:
      - mysql_db
    networks:
      - rarecare-network

  authentification:
    build:
      context: ./services/authentification
      dockerfile: docker/Dockerfile
    volumes:
      - ./services/authentification:/var/www/html
      - ./services/authentification/docker/nginx.conf:/opt/docker/etc/nginx/vhost.conf:ro
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql_db
      DB_PORT: 3306
      DB_DATABASE: auth_db
      DB_USERNAME: rarecare
      DB_PASSWORD: rarecare_password
    depends_on:
      - mysql_db
    networks:
      - rarecare-network

  autorisation:
    build:
      context: ./services/autorisation
      dockerfile: docker/Dockerfile
    volumes:
      - ./services/autorisation:/var/www/html
      - ./services/autorisation/docker/nginx.conf:/opt/docker/etc/nginx/vhost.conf:ro
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql_db
      DB_PORT: 3306
      DB_DATABASE: rbac_db
      DB_USERNAME: rarecare
      DB_PASSWORD: rarecare_password
    depends_on:
      - mysql_db
    networks:
      - rarecare-network

  # --- Infrastructure ---
  pg_db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: rarecare
      POSTGRES_PASSWORD: rarecare_password
      POSTGRES_DB: patients_db
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - rarecare-network

  mysql_db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: rarecare
      MYSQL_PASSWORD: rarecare_password
      # To initialize multiple databases, we'll use a script in docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-mysql:/docker-entrypoint-initdb.d
    networks:
      - rarecare-network

  redis:
    image: redis:alpine
    networks:
      - rarecare-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - rarecare-network

networks:
  rarecare-network:
    driver: bridge

volumes:
  pg-data:
  mysql-data:
