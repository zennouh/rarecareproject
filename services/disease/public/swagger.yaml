openapi: 3.0.0
info:
  title: 'RareCare API'
  description: "Documentation de l'API"
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8000'
    description: 'Serveur Local'
paths:
  /api/maladies:
    get:
      tags:
        - Maladie
      summary: 'Lister toutes les maladies'
      operationId: 468a6ccab486087f8b8394f8f5dc0d63
      responses:
        '200':
          description: 'Liste des maladies'
  /api/maladies/store:
    post:
      tags:
        - Maladie
      summary: 'Créer une nouvelle maladie'
      operationId: ea90b36949dce842ff3b9ba32df3ef61
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                name:
                  type: string
                  example: Grippe
                description:
                  type: string
                  example: 'Infection respiratoire'
              type: object
      responses:
        '201':
          description: 'Maladie créée avec succès'
        '422':
          description: 'Erreur de validation'
  '/api/maladies/{id}':
    get:
      tags:
        - Maladie
      summary: 'Afficher une maladie spécifique'
      operationId: e12d005f978a31ae522b8a4caa8d7144
      parameters:
        -
          name: id
          in: path
          description: 'ID de la maladie'
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 'Maladie trouvée'
        '404':
          description: 'Maladie non trouvée'
    put:
      tags:
        - Maladie
      summary: 'Mettre à jour une maladie'
      operationId: ad499761e2396f9be20cfd6ceb077a61
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                name:
                  type: string
                description:
                  type: string
              type: object
      responses:
        '200':
          description: 'Maladie mise à jour'
        '404':
          description: 'Maladie non trouvée'
    delete:
      tags:
        - Maladie
      summary: 'Supprimer une maladie'
      operationId: 6c9c6973e341c1730883cd308c183d24
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 'Maladie supprimée'
        '404':
          description: 'Maladie non trouvée'
tags:
  -
    name: Maladie
    description: Maladie
