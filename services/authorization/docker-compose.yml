version: '3.8'

services:
  authorization:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: authorization-service
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8002}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/opt/docker/etc/nginx/vhost.conf:ro
    env_file:
      - .env
    depends_on:
      - authorization-db
    networks:
      - authorization-network

  authorization-db:
    image: mysql:8.0
    container_name: authorization-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_DATABASE:-rbac_db}
      MYSQL_USER: ${DB_USERNAME:-rarecare}
      MYSQL_PASSWORD: ${DB_PASSWORD:-rarecare_password}
    ports:
      - "${DB_PORT_EXPOSE:-33062}:3306"
    volumes:
      - authorization-db-data:/var/lib/mysql
    networks:
      - authorization-network
      - app_network

networks:
  authorization-network:
    driver: bridge
  app_network:
    external: true 
volumes:
  authorization-db-data:
